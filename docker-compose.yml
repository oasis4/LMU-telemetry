services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - TELEMETRY_DIR=/data
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8001"]
    volumes:
      - ${TELEMETRY_DIR:-./data}:/data:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
